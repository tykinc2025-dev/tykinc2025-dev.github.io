<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>人材開発支援助成金申請手続きの流れ</title>

  <style>
    :root{
      --bg:#f3f3f3;
      --text:#0f1115;
      --muted:#777;
      --danger:#e03a3a;
      --danger-soft:#f3b1b1;
      --white:#ffffff;
      --container:1120px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:system-ui, -apple-system, "Noto Sans JP", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      width:min(var(--container), calc(100% - 44px));
      margin:auto;
    }

    .main{
      padding:50px 0 60px;
    }

    .hero{
      text-align:center;
      margin-bottom:40px;
    }

    .title{
      font-size:32px;
      font-weight:900;
      margin:0;
      color:#0b1730;
    }

    .divider{
      width:36px;
      height:4px;
      margin:16px auto;
      border-radius:999px;
      background:linear-gradient(90deg,#e03a3a,#f3b1b1);
    }

    .desc{
      font-size:18px;
      font-weight:700;
      color:var(--muted);
      margin-top:20px;
      line-height:1.8;
    }

    .pdf-wrap{
      max-width:960px;
      margin:0 auto;
      background:#fff;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    .pdf{
      width:100%;
      height:1200px;
      border:none;
      display:block;
      background:#fff;
    }

    .note{
      text-align:center;
      margin-top:12px;
      font-size:13px;
      color:#666;
    }

    @media (max-width:767px){
      .title{
        font-size:24px;
      }

      .desc{
        font-size:15px;
      }

      .pdf{
        height:75vh;
      }
    }
  </style>
</head>

<body>

  <!-- ===== ヘッダー（そのまま使う） ===== -->
  <header>
    <!-- ここに既存ヘッダーを貼る -->
  </header>

  <!-- ===== メイン ===== -->
  <main class="main">
    <div class="container">

      <section class="hero">
        <h1 class="title">人材開発支援助成金申請手続きの流れ</h1>
        <div class="divider"></div>
        <div class="desc">
          以下の資料をそのまま画面内でご確認いただけます。
        </div>
      </section>

      <section class="pdf-wrap">
        <iframe 
          class="pdf"
          src="./schedule-402.pdf#toolbar=0&navpanes=0&scrollbar=0">
        </iframe>
      </section>

      <div class="note">
        ※ 表示されない場合はページを再読み込みしてください
      </div>

    </div>
  </main>

  <!-- ===== フッター（そのまま使う） ===== -->
  <footer>
    <!-- ここに既存フッターを貼る -->
  </footer>

</body>
</html>
