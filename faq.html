<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>よくあるご質問</title>
  <style>
    :root{
      --bg:#f3f3f3;
      --text:#0f1115;
      --muted:#777;
      --light-blue:#d8e8f3;
      --danger:#e03a3a;
      --danger-soft:#f3b1b1;
      --plus:#3f73ad;
      --white:#ffffff;
      --container:1120px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    .container{
      width:min(var(--container), calc(100% - 44px));
      margin:auto;
    }

    .main{
      padding:50px 0 60px;
    }

    .hero{
      text-align:center;
      margin-bottom:42px;
    }

    .faq-title{
      font-size:32px;
      font-weight:900;
      letter-spacing:.04em;
      margin:0;
      line-height:1.6;
      color:#0b1730;
    }

    .faq-divider{
      width:36px;
      height:4px;
      margin:18px auto;
      border-radius:999px;
      background:linear-gradient(90deg,#e03a3a,#f3b1b1);
    }

    .faq-description{
      font-size:18px;
      font-weight:700;
      color:#777;
      margin-top:30px;
      line-height:1.9;
    }

    .faq-groups{
      display:flex;
      flex-direction:column;
      gap:34px;
      max-width:860px;
      margin:0 auto;
    }

    .faq-group-title{
      display:flex;
      align-items:center;
      gap:10px;
      margin:0 0 14px;
    }

    .faq-group-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#2aa7d7;
      flex:0 0 auto;
    }

    .faq-group-title h2{
      margin:0;
      font-size:24px;
      font-weight:900;
      line-height:1.5;
      color:#0f1115;
    }

    .faq-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .faq-item{
      background:transparent;
    }

    .faq-question{
      position:relative;
      min-height:64px;
      display:flex;
      align-items:center;
      width:100%;
      padding:0 62px 0 24px;
      border:none;
      border-radius:18px;
      background:#d8e8f3;
      cursor:pointer;
      text-align:left;
      color:#0f1115;
    }

    .faq-question-text{
      font-size:16px;
      font-weight:800;
      line-height:1.5;
      letter-spacing:.01em;
    }

    .faq-toggle{
      position:absolute;
      right:22px;
      top:50%;
      width:20px;
      height:20px;
      transform:translateY(-50%);
    }

    .faq-toggle::before,
    .faq-toggle::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:20px;
      height:2.5px;
      background:#3f73ad;
      transform:translate(-50%,-50%);
      border-radius:999px;
      transition:.2s ease;
    }

    .faq-toggle::after{
      transform:translate(-50%,-50%) rotate(90deg);
    }

    .faq-item.open .faq-toggle::after{
      transform:translate(-50%,-50%) rotate(0deg);
    }

    .faq-answer{
      display:none;
      margin-top:8px;
    }

    .faq-answer-inner{
      background:#fff;
      border-radius:16px;
      padding:16px;
    }

    .faq-answer-inner p{
      margin:0;
      font-size:14px;
      font-weight:700;
      line-height:1.9;
      color:#444;
    }

    @media (max-width: 767px){
      .main{
        padding:40px 0 48px;
      }

      .faq-title{
        font-size:24px;
        line-height:1.5;
      }

      .faq-divider{
        margin:16px auto;
      }

      .faq-description{
        font-size:16px;
        margin-top:24px;
        line-height:1.9;
      }

      .faq-groups{
        gap:28px;
      }

      .faq-group-title h2{
        font-size:19px;
      }

      .faq-question{
        min-height:auto;
        padding:14px 54px 14px 18px;
      }

      .faq-question-text{
        font-size:13px;
        font-weight:700;
        line-height:1.55;
        letter-spacing:.02em;
      }

      .faq-answer-inner{
        padding:14px 16px;
        border-radius:14px;
      }

      .faq-answer-inner p{
        font-size:13px;
        line-height:1.8;
      }
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="container">
      <section class="hero">
        <h1 class="faq-title">よくあるご質問</h1>
        <div class="faq-divider"></div>
        <div class="faq-description">
          質問をクリックすると回答が開きます。内容が見つからない場合は、ページ下部の問い合わせ窓口をご利用ください。
        </div>
      </section>

      <section class="faq-groups" id="faqGroups"></section>
    </div>
  </main>

  <script>
    const categories = [
      {
        key: "progress",
        label: "視聴状況・修了",
        faqs: [
          {
            q: "視聴済みなのに『0％』『100％未満』『完了にならない』と表示されます",
            a: "視聴履歴は正常に記録されていても、表示反映にタイムラグや一時的な不具合が生じる場合があります。まずは時間を置いて再読み込みしてください。再視聴が不要なケースもあるため、改善しない場合は受講者名・講座名を添えてお問い合わせください。"
          },
          {
            q: "最後まで見たのに修了証書が出ません／ダウンロードできません",
            a: "システム反映の遅延や一時的な不具合が原因の場合があります。再ログインのうえ再度ご確認ください。改善しない場合は、対象講座名と受講者様名をお知らせいただければ確認いたします。"
          },
          {
            q: "管理者画面に視聴状況が反映されません",
            a: "管理者画面の表示は、実際の視聴記録より遅れて反映される場合があります。受講者側で視聴が完了していても、管理画面上ですぐに表示が変わらないことがあります。時間を置いても変わらない場合はお問い合わせください。"
          },
          {
            q: "終了日時とは何を示していますか？",
            a: "画面上の『終了日時』は、最後に動画を視聴した日時が反映される仕様です。すべての動画を視聴完了した場合は、ユニットの修了状態欄に『3/3』などの完了表示がされます。"
          },
          {
            q: "講座終了者数が0人のままですが問題ないですか？",
            a: "対象となる複数コースをすべて受講完了した時点で反映される仕組みです。現在受講中のコースのみ完了している段階では、終了者数が0人と表示される場合があります。"
          }
        ]
      },
      {
        key: "playback",
        label: "動画再生・操作",
        faqs: [
          {
            q: "動画が再生できない／途中で止まる／見られなくなりました",
            a: "画面が読み込み中のまま・途中で止まる・サイト自体が開けない・エラーメッセージが出る、など状況により確認方法が異なります。可能であればスクリーンショットを添えてお問い合わせください。"
          },
          {
            q: "スマホで視聴すると落ちる・進まないです",
            a: "安定した受講のため、パソコンまたはタブレットでの視聴を推奨しています。特にブラウザは最新版のGoogle Chrome、通信環境は安定したWi-Fiをご利用ください。"
          },
          {
            q: "PC推奨ですか？ iPadやスマホでも見られますか？",
            a: "基本的には誤操作を防ぎやすいパソコン視聴をおすすめしていますが、iPadやスマートフォンでも視聴は可能です。端末によっては再生挙動が異なることがあります。"
          },
          {
            q: "早送りやスキップはできますか？",
            a: "本講座は、早送りやスキップができない仕様です。各動画を順番に最後までご視聴ください。助成金申請時には視聴履歴が確認対象となるため、再生位置の操作はお控えください。"
          },
          {
            q: "巻き戻し・繰り返し視聴はできますか？",
            a: "一度最後まで視聴し、視聴完了となった後に再生バーが表示される仕様です。視聴完了後は必要に応じて振り返り視聴が可能です。なお、一部端末では完了前に再生バーが表示される場合があり、操作すると意図せずスキップ扱いとなることがあります。"
          },
          {
            q: "スキップ扱いになってしまった場合はどうなりますか？",
            a: "再生バーの操作などにより、意図せずスキップとして記録されることがあります。その場合は、最後に正常に記録された位置から再視聴が必要になることがあります。詳細は履歴確認のうえご案内します。"
          }
        ]
      },
      {
        key: "period",
        label: "受講期間・公開期間",
        faqs: [
          {
            q: "『期間外』と表示されます",
            a: "視聴期間外、または対象外コースへアクセスしている可能性があります。弊社側で期間設定を確認のうえ必要な対応を行う場合がありますので、ログイン後の画面情報とあわせてお問い合わせください。"
          },
          {
            q: "別コースの動画を開いて見られません",
            a: "現在視聴できるのは、対象期間内のコースのみです。別コースは公開開始日以降に視聴可能になる場合があります。"
          },
          {
            q: "受講期間内に終わらなかった場合はどうなりますか？",
            a: "受講期間内に視聴が完了しなかった場合、助成金申請時に対象外となる可能性があります。制度上、後から修正できないため、期間内完了にご協力ください。"
          },
          {
            q: "案内された日付の中なら、いつ受講してもよいですか？",
            a: "はい。ご案内している受講期間内であれば、どの日にご受講いただいても問題ありません。可能な範囲で就業時間内の受講をお願いします。"
          }
        ]
      },
      {
        key: "subsidy",
        label: "助成金申請・就業時間",
        faqs: [
          {
            q: "受講は就業時間内でないといけませんか？",
            a: "助成金申請をご予定の場合、原則として就業時間内での受講をお願いしております。申請時には視聴履歴と出勤記録等の整合確認が必要となるためです。やむを得ず就業時間外に受講される場合は、残業代等の適切な処理が必要です。"
          },
          {
            q: "就業時間は何時から何時ですか？",
            a: "各受講者様の雇用契約書や就業規則に定められた就業時間内での受講をお願いしています。会社ごとに異なるため、社内規定をご確認ください。"
          },
          {
            q: "感想文も就業時間内に記入する必要がありますか？ 何文字必要ですか？",
            a: "助成金申請をご予定の場合、感想文の記入も就業時間内での対応をお願いします。また、管理画面上で完了表示とするためには350文字以上の記入が必要です。"
          },
          {
            q: "視聴履歴は管理されていますか？",
            a: "はい。視聴履歴はシステム上で記録されます。助成金申請時には、視聴履歴と出勤記録等を照合して申請手続きを進めます。"
          },
          {
            q: "労働局から社員へ電話確認はありますか？",
            a: "基本的には多くありませんが、状況に応じて勤務時間の確認資料や残業代支給状況などの提出を求められる場合があります。"
          }
        ]
      },
      {
        key: "account",
        label: "ログイン・アカウント",
        faqs: [
          {
            q: "ログインできません",
            a: "ID・パスワードをコピー＆ペーストする際、前後に空白が入っているとエラーになる場合があります。不要なスペースがないか確認のうえ再度お試しください。改善しない場合は画面表示内容とあわせてご連絡ください。"
          },
          {
            q: "管理者も動画を視聴する必要がありますか？",
            a: "管理者様ご自身が動画を視聴する必要はありません。受講者様が期限内に完了できるよう、進捗確認やお声がけをお願いいたします。"
          },
          {
            q: "対象コース・対象アカウントはどれですか？",
            a: "弊社よりご案内している対象コース／対象アカウントのみが対応対象です。対象外アカウントは視聴不要です。"
          },
          {
            q: "対象外アカウントはユニット終了にしなくてよいですか？",
            a: "はい、対象外アカウントについてはユニット終了にしていただく必要はありません。対象の受講者様のみ視聴完了いただいていれば問題ありません。"
          }
        ]
      },
      {
        key: "materials",
        label: "教材・再視聴・言語対応",
        faqs: [
          {
            q: "教材テキストはありますか？",
            a: "教材テキストは別途ご案内またはお届けにて対応しております。振り返り学習の際にもご活用いただけます。"
          },
          {
            q: "振り返り視聴はできますか？",
            a: "受講期間中かつ一度視聴完了している場合に可能です。受講期間終了後は制度上、再視聴できません。"
          },
          {
            q: "振り返り視聴は就業時間外でもよいですか？",
            a: "一度視聴完了している動画の振り返り視聴については、就業時間外でも問題ありません。ただし、正式な受講として扱われる初回視聴は就業時間内での対応をお願いいたします。"
          },
          {
            q: "外国語版の動画はありますか？",
            a: "現在、ベトナム語版・インドネシア語版の動画はございません。復習用として教材テキストをご活用ください。"
          }
        ]
      }
    ];

    const faqGroups = document.getElementById("faqGroups");

    categories.forEach((category) => {
      const group = document.createElement("section");
      group.className = "faq-group";
      group.id = category.key;

      const title = document.createElement("div");
      title.className = "faq-group-title";
      title.innerHTML = `
        <div class="faq-group-dot"></div>
        <h2>${category.label}</h2>
      `;
      group.appendChild(title);

      const list = document.createElement("div");
      list.className = "faq-list";

      category.faqs.forEach((faq) => {
        const item = document.createElement("div");
        item.className = "faq-item";

        const button = document.createElement("button");
        button.className = "faq-question";
        button.type = "button";
        button.innerHTML = `
          <span class="faq-question-text"></span>
          <span class="faq-toggle"></span>
        `;
        button.querySelector(".faq-question-text").textContent = faq.q;

        const answer = document.createElement("div");
        answer.className = "faq-answer";
        answer.innerHTML = `
          <div class="faq-answer-inner">
            <p></p>
          </div>
        `;
        answer.querySelector("p").textContent = faq.a;

        button.addEventListener("click", () => {
          item.classList.toggle("open");
          answer.style.display = item.classList.contains("open") ? "block" : "none";
        });

        item.appendChild(button);
        item.appendChild(answer);
        list.appendChild(item);
      });

      group.appendChild(list);
      faqGroups.appendChild(group);
    });
  </script>
</body>
</html>
